# Render blueprint — deploy del backend DePaso.
# Conectar el repo en https://dashboard.render.com → New → Blueprint.
# DATABASE_URL se setea a mano con la connection string de Supabase
# (formato: postgresql+psycopg://USER:PASSWORD@HOST:5432/postgres).
services:
  - type: web
    name: depaso-api
    runtime: python
    rootDir: depaso_rest
    plan: free
    # El esquema se crea solo al arrancar (create_all en el lifespan).
    # Para migraciones gestionadas: correr `alembic upgrade head` manualmente
    # (preDeployCommand requiere plan pago en Render).
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: production
      - key: VISION_MODEL_PATH
        value: ./ml/models/cargo_classifier_v1.keras
