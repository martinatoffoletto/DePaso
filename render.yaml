# Render blueprint — deploy del backend DePaso.
# Conectar el repo en https://dashboard.render.com → New → Blueprint.
# DATABASE_URL se setea a mano con la connection string de Supabase
# (formato: postgresql+psycopg://USER:PASSWORD@HOST:5432/postgres).
services:
  - type: web
    name: depaso-api
    runtime: python
    rootDir: depaso_rest
    plan: free
    # El esquema se crea solo al arrancar (create_all en el lifespan).
    # Para migraciones gestionadas: correr `alembic upgrade head` manualmente
    # (preDeployCommand requiere plan pago en Render).
    # alembic upgrade head runs here because preDeployCommand requires a paid plan.
    # On first deploy this creates all tables; subsequent deploys apply new migrations.
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn src.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: production
      # VISION_MODEL_PATH is optional — the endpoint falls back to mock/rule-based
      # mode when the var is absent or the model file is not mounted.
      # Set this manually in the Render dashboard only if you mount a model volume.
      - key: VISION_MODEL_PATH
        sync: false
