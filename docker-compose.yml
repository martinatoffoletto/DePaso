services:
  db:
    image: postgis/postgis:15-3.3
    container_name: depaso_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: depaso
      POSTGRES_PASSWORD: depaso123
      POSTGRES_DB: depaso_dev
    ports:
      - "5432:5432"
    volumes:
      - depaso_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U depaso -d depaso_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    # No arranca con `docker compose up` a secas (start.sh corre uvicorn local).
    # Para el stack completo dockerizado: docker compose --profile full up
    profiles: ["full"]
    build: ./depaso_rest
    container_name: depaso_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://depaso:depaso123@db:5432/depaso_dev
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production}
      DEBUG: "false"
      ENVIRONMENT: production
    ports:
      - "8000:8000"

volumes:
  depaso_pgdata:
