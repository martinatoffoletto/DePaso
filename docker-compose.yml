services:
  db:
    image: postgis/postgis:15-3.3
    container_name: depaso_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: depaso
      POSTGRES_PASSWORD: depaso123
      POSTGRES_DB: depaso_dev
    ports:
      - "5432:5432"
    volumes:
      - depaso_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U depaso -d depaso_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    # No arranca con `docker compose up` a secas (start.sh corre uvicorn local).
    # Para el stack completo dockerizado: docker compose --profile full up
    profiles: ["full"]
    build: ./depaso_rest
    container_name: depaso_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://depaso:depaso123@db:5432/depaso_dev
      # Dev local: se autogenera un secreto por arranque si no pasás JWT_SECRET_KEY.
      # En prod (Render) se setea uno real por env — nunca este default.
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-only-secret-do-not-use-in-prod-0192837465}
      DEBUG: "false"
      ENVIRONMENT: development
    ports:
      - "8000:8000"

  web:
    # Panel web (build estático servido por nginx). Parte del stack completo.
    # Levantar todo junto: docker compose --profile full up --build
    profiles: ["full"]
    build:
      context: ./depaso_web
      args:
        # El navegador corre en el host, así que apunta al puerto publicado de la API.
        VITE_API_URL: http://localhost:8000/api/v1
    container_name: depaso_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  depaso_pgdata:
