server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta que no sea un archivo real cae en index.html,
    # así react-router maneja el ruteo del lado del cliente (deep links, refresh).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache largo para assets con hash en el nombre.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
